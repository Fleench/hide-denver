name: hide_denver
description: A real-time IRL game companion app with live geofencing and dynamic play-zone shrinking.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^8.3.0
  geolocator: ^14.0.2
  latlong2: ^0.9.1
  turf: ^0.0.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/game_zone.geojson
