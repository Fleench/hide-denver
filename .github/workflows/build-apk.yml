name: Build Android APK

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  build-apk:
    name: Build and publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android platform files
        working-directory: flutter_app
        run: flutter create --platforms=android --project-name hide_denver .

      - name: Add Android runtime permissions and loopback cleartext policy
        working-directory: flutter_app
        run: |
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text()
          permissions = [
              '<uses-permission android:name="android.permission.INTERNET" />',
              '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />',
              '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />',
          ]
          missing = [permission for permission in permissions if permission not in text]
          if missing:
              text = text.replace('<application', '\n    ' + '\n    '.join(missing) + '\n    <application', 1)
          if 'android:usesCleartextTraffic=' not in text:
              text = text.replace('<application', '<application\n        android:usesCleartextTraffic="true"', 1)
          if 'android:networkSecurityConfig=' not in text:
              text = text.replace('<application', '<application\n        android:networkSecurityConfig="@xml/network_security_config"', 1)
          manifest.write_text(text)

          network_security_config = Path('android/app/src/main/res/xml/network_security_config.xml')
          network_security_config.parent.mkdir(parents=True, exist_ok=True)
          network_security_config.write_text('''<?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true" />
          </network-security-config>
          ''')
          PY

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build release APK
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Read app package metadata
        working-directory: flutter_app
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          metadata = {}
          for line in Path('pubspec.yaml').read_text().splitlines():
              if ':' not in line or line.startswith(' '):
                  continue
              key, value = line.split(':', 1)
              metadata[key.strip()] = value.strip().strip('"\'')

          with Path(os.environ['GITHUB_ENV']).open('a') as env:
              env.write(f"APP_NAME={metadata['name']}\n")
              env.write(f"APP_VERSION={metadata['version']}\n")
          PY

      - name: Rename APK
        run: cp flutter_app/build/app/outputs/flutter-apk/app-release.apk "${APP_NAME}-${APP_VERSION}.apk"

      - name: Publish APK to new release
        uses: ncipollo/release-action@v1
        with:
          tag: android-${{ github.run_id }}-${{ github.run_attempt }}
          name: ${{ env.APP_NAME }} ${{ env.APP_VERSION }} APK
          body: |
            Automated `${{ env.APP_NAME }}` APK build version `${{ env.APP_VERSION }}` for `${{ github.ref_name }}` at `${{ github.sha }}`.
            Workflow run: `${{ github.run_id }}` attempt `${{ github.run_attempt }}`.
          commit: ${{ github.sha }}
          artifacts: ${{ env.APP_NAME }}-${{ env.APP_VERSION }}.apk
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
